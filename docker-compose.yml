services:
  postgres:
    image: postgres:17-alpine
    container_name: formulalab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: formulalab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - formulalab-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d formulalab"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  formulalab-postgres-data:
